<!-- app\Templates\anomaly_detection.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anomaly Detection</title>
    <link rel="icon" href="{{ url_for('static', filename='images/logo.png') }}" type="image/x-icon">
    <!-- Fonts and Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <!-- Using 'Roboto' for consistency -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- Chart.js Library for ECG-like visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.3.2/socket.io.min.js"></script>
    <!-- Internal CSS -->
    <style>
        /* Global Styles */
        body {
            margin: 0;
            font-family: 'Roboto', Arial, sans-serif;
            background-color: #121212;
            color: #E0E0E0;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Sidebar Navigation */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 250px;
            height: 100%;
            background-color: #1F1F1F;
            overflow-x: hidden;
            transition: transform 0.3s ease;
            transform: translateX(-100%);
            z-index: 1000;
            padding-top: 60px;
        }

        .sidebar.active {
            transform: translateX(0);
        }

        .sidebar a {
            padding: 15px 25px;
            font-size: 18px;
            color: #E0E0E0;
            display: block;
            position: relative;
            text-decoration: none;
        }

        .sidebar a:hover {
            background-color: #333333;
            color: #BB86FC;
        }

        .sidebar a::after {
            content: attr(data-tooltip);
            position: absolute;
            left: 100%;
            top: 50%;
            transform: translateY(-50%) translateX(10px);
            background-color: #333333;
            color: #E0E0E0;
            padding: 5px 10px;
            border-radius: 4px;
            opacity: 0;
            white-space: nowrap;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .sidebar a:hover::after {
            opacity: 1;
        }

        .sidebar .app-name {
            font-size: 24px;
            color: #FFFFFF;
            text-align: center;
            margin-bottom: 20px;
        }

        .sidebar .logo {
            width: 80%;
            display: block;
            margin: 0 auto 20px;
        }

        /* Overlay */
        .overlay {
            display: none;
        }

        .overlay.active {
            display: block;
            position: fixed;
            top: 0;
            left: 250px;
            width: calc(100% - 250px);
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 900;
        }

        /* Open and Close Buttons */
        .open-btn, .close-btn {
            font-size: 30px;
            cursor: pointer;
            background-color: transparent;
            border: none;
            color: #E0E0E0;
            position: fixed;
            top: 15px;
            transition: all 0.3s ease;
        }

        .open-btn {
            left: 15px;
            z-index: 1100;
        }

        .close-btn {
            right: 25px;
        }

        .open-btn:hover, .close-btn:hover {
            color: #BB86FC;
            transform: scale(1.1);
        }

        /* Main Content */
        .main-content {
            transition: margin-left 0.3s ease;
            padding: 20px;
        }

        .main-content.shifted {
            margin-left: 250px;
        }

        .main-content .app-name {
            font-size: 36px;
            color: #FFFFFF;
            text-align: center;
        }

        .main-content .logo {
            width: 150px;
            display: block;
            margin: 20px auto;
        }

        /* Container */
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 70vh;
            text-align: center;
            padding: 20px;
        }

        /* Form Container */
        .form-container {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 500px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
            position: relative;
        }

        .form-container.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .form-container h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #BB86FC;
        }

        .form-container p {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #b0b0b0;
        }

        /* Loader */
        .loader {
            border: 8px solid #1e1e1e;
            border-top: 8px solid #BB86FC;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        #topBtn {
            display: none;
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            font-size: 18px;
            padding: 15px;
            border: none;
            background-color: #BB86FC;
            color: #E0E0E0;
            border-radius: 50%;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        #topBtn:hover {
            background-color: #3700B3;
        }

        button:focus {
            outline: none;
        }

        .logo, .form-container {
            transition: transform 0.3s ease;
        }

        .logo:hover, .form-container:hover {
            transform: scale(1.02);
        }

        @media screen and (max-width: 768px) {
            .sidebar {
                width: 200px;
            }

            .sidebar a {
                font-size: 16px;
            }

            .open-btn, .close-btn {
                font-size: 24px;
                top: 10px;
            }

            .open-btn {
                left: 10px;
            }

            .close-btn {
                right: 15px;
            }

            .main-content .app-name {
                font-size: 28px;
            }

            .main-content.shifted {
                margin-left: 200px;
            }

            .overlay.active {
                left: 200px;
                width: calc(100% - 200px);
            }
        }

        /* Background Animation */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* background: url('images/animated-background.svg') repeat; */
            background-size: cover;
            opacity: 0.03;
            z-index: -1;
        }
        
        #anomaly-result {
            font-size: 1.2rem;
            color: #76c7c0;
            font-weight: bold;
            margin-top: 20px;
        }

        /* ECG Chart Canvas Styling */
        #ecgChart {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 5px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <!-- Open Sidebar Button -->
    <button class="open-btn" id="open-btn" onclick="toggleSidebar()">&#9776;</button>

   <!-- Sidebar Navigation -->
<div class="sidebar" id="sidebar">
    <button class="close-btn" onclick="toggleSidebar()">&times;</button>
    <div class="app-name">S.H.I.E.L.D.</div>
    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="S.H.I.E.L.D. Logo" class="logo" />

    <a href="{{ url_for('home') }}" data-tooltip="Home"><i class="fas fa-home"></i> Home</a>
    <a href="{{ url_for('file_transfer') }}" data-tooltip="File Transfer"><i class="fas fa-file-upload"></i> File Transfer</a>
    <a href="{{ url_for('anomaly_detection') }}" data-tooltip="Anomaly Detection"><i class="fas fa-shield-alt"></i> Anomaly Detection</a>
    <a href="{{ url_for('results') }}" data-tooltip="Results"><i class="fas fa-chart-line"></i> Results</a>
</div>


    <!-- Overlay -->
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <!-- Main Content -->
    <div class="main-content" id="main-content">
        <div class="app-name">S.H.I.E.L.D.</div>
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="logo" />

        <!-- Container -->
        <div class="container">
            <div class="form-container">
                <h2>Anomaly Detection in Progress</h2>
                <p>Your file is being transferred and checked for anomalies. Please wait...</p>

                <!-- Loader -->
                <div class="loader"></div>
                <p>Upload Progress: <span id="progress-percent">0%</span></p>
                <p>Real-time speed: <span id="speed">0 KB/s</span></p>

                <canvas id="ecgChart" width="400" height="150"></canvas>
                <!-- Anomaly Result (Hidden initially) -->
                <!-- Popup notifications for transfer results -->
                <div id="popup" style="display: none;">
                     <p id="popup-message"></p>
                </div>
            </div>
        </div>

        <!-- Back to Top Button -->
        <button onclick="topFunction()" id="topBtn" title="Go to top">&#8679;</button>
    </div>

    <script>
         
        // Sidebar Toggle Function
        function toggleSidebar() {
            const sidebar = document.getElementById("sidebar");
            const mainContent = document.getElementById("main-content");
            const openBtn = document.getElementById("open-btn");
            const overlay = document.getElementById("overlay");

            sidebar.classList.toggle('active');
            mainContent.classList.toggle('shifted');
            overlay.classList.toggle('active');

            if (sidebar.classList.contains('active')) {
                openBtn.style.display = "none";
            } else {
                openBtn.style.display = "block";
            }
        }

        // Back to Top Button
        window.onscroll = function() { scrollFunction(); };

        function scrollFunction() {
            const topBtn = document.getElementById("topBtn");
            if (document.body.scrollTop > 400 || document.documentElement.scrollTop > 400) {
                topBtn.style.display = "block";
            } else {
                topBtn.style.display = "none";
            }
        }

        function topFunction() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Start the file transfer when the page loads
window.onload = function () {
    const files = JSON.parse(sessionStorage.getItem("fileNames"));

    if (!files || files.length === 0) {
        alert("No files selected for transfer.");
        window.location.href = "/file_transfer";
        return;
    }

    // Send file names to backend to start processing
    fetch("/start_transfer", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ files })
    })
    .then(response => response.json())
    .then(data => {
        if (data.error) {
            alert("Error: " + data.error);
            window.location.href = "/file_transfer";
        }
    });

    // Poll for progress updates every second
    setInterval(fetchProgress, 1000);
};

// Fetch progress and anomaly updates
function fetchProgress() {
    fetch("/progress")
    .then(response => response.json())
    .then(data => {
        document.getElementById("progress-percent").textContent = data.percent + "%";
        document.getElementById("speed").textContent = data.speed + " KB/s";

        // Update ECG Chart
        updateECGChart(data.anomaly_score);

        // Handle anomaly detection or success
        if (data.status === "anomaly") {
            showPopup("Anomaly detected: " + data.anomaly_type);
            setTimeout(() => window.location.href = "/results", 3000);
        } else if (data.status === "success") {
            showPopup("File Transferred Successfully");
            setTimeout(() => window.location.href = "/results", 3000);
        }
    });
}

// Function to update ECG chart
function updateECGChart(value) {
    ecgChart.data.datasets[0].data.shift();
    ecgChart.data.datasets[0].data.push(value);
    ecgChart.update();
}

// Show popup notification
function showPopup(message) {
    document.getElementById("popup-message").textContent = message;
    document.getElementById("popup").style.display = "block";
}
    </script>
</body>
</html>
