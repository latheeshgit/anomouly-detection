<svg xmlns="http://www.w3.org/2000/svg" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink" width="100%" height="100%" preserveAspectRatio="none">
    <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#121212;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1F1F1F;stop-opacity:1" />
        </linearGradient>
        <pattern id="pattern1" width="50" height="50" patternUnits="userSpaceOnUse">
            <circle cx="25" cy="25" r="1" fill="#BB86FC" opacity="0.3">
                <animate attributeName="opacity"
                    values="0.3;0.7;0.3"
                    dur="4s"
                    repeatCount="indefinite"/>
            </circle>
        </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#grad1)"/>
    <rect width="100%" height="100%" fill="url(#pattern1)"/>
</svg>
    